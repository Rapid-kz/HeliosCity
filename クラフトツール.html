<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クラフト計算ツール</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
	/* ★ 左上固定のリンクボタン設定 ★ */
        .fixed-link-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            display: inline-block;
            padding: 10px 18px;
            background-color: #2c3e50;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: background-color 0.2s;
        }
        .fixed-link-btn:hover {
            background-color: #34495e;
        }
        .container {
	    width: 800px;        /* max-width から width（固定）に変更 */
	    margin: 20px auto;   /* 上下に余白、左右は自動で中央寄せ */
	    background: #fff;
	    padding: 25px;
	    border-radius: 8px;
	    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
	    box-sizing: border-box; /* パディングを含めて800pxにする設定 */
	}
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 24px;
        }
        /* タブスタイル */
	.tabs {
	    display: flex;
	    border-bottom: 2px solid #ddd;
	    margin-bottom: 20px;
	    width: 100%;        /* コンテナの幅（800px）に合わせる */
	}
        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            color: #7f8c8d;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        .tab-btn:hover {
            color: #3498db;
        }
        .tab-btn.active {
            color: #3498db;
            border-bottom-color: #3498db;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        /* 入力エリア */
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 6px;
        }
        label {
            font-weight: bold;
            color: #34495e;
        }
        select, input[type="number"] {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
        }
        select {
            flex: 1;
            min-width: 200px;
        }
        input[type="number"] {
            width: 80px;
        }
        /* 結果表示エリア */
        .result-section {
            margin-top: 20px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .info-card {
            background: #f1f2f6;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
        }
        .info-card .title {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 5px;
        }
        .info-card .value {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
        }
        /* 材料リスト */
        .materials-title {
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .materials-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        .materials-list li {
            background: #eef7fe;
            border-left: 4px solid #3498db;
            padding: 10px 15px;
            border-radius: 0 4px 4px 0;
            display: flex;
            justify-content: space-between;
            font-weight: 500;
        }
        .no-materials {
            color: #95a5a6;
            font-style: italic;
        }
    </style>
</head>

<a href="https://rapid-kz.github.io/HeliosCity/" class="fixed-link-btn">◀ ツール一覧へ戻る</a>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('weapon')">武器製造</button>
        <button class="tab-btn" onclick="switchTab('medical')">手工芸</button>
        <button class="tab-btn" onclick="switchTab('tools')">犯罪道具</button>
        <button class="tab-btn" onclick="switchTab('ingot')">溶鉱炉</button>
        <button class="tab-btn" onclick="switchTab('survival')">ホームレス</button>
    </div>

    <div class="form-group">
        <div>
            <label for="item-select">アイテム: </label>
            <select id="item-select" onchange="calculate()"></select>
        </div>
        <div>
            <label for="item-count">個数: </label>
            <input type="number" id="item-count" value="1" min="1" oninput="calculate()">
        </div>
    </div>

    <div class="result-section">
        <div class="info-grid">
            <div class="info-card">
                <div class="title">熟練度 (固定)</div>
                <div class="value" id="res-mastery">-</div>
            </div>
            <div class="info-card">
                <div class="title">必要労働力</div>
                <div class="value" id="res-labor">-</div>
            </div>
            <div class="info-card">
                <div class="title">合計価格</div>
                <div class="value" id="res-price">-</div>
            </div>
        </div>

        <div class="materials-title">必要材料</div>
        <ul id="materials-list" class="materials-list">
            </ul>
    </div>
</div>

let currentTab = 'weapon';

// タブ切り替え関数
function switchTab(tabId) {
    currentTab = tabId;
    
    // タブボタンのアクティブ状態を変更
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    // プルダウンの選択肢を更新
    const select = document.getElementById('item-select');
    select.innerHTML = '';
    
    craftData[tabId].forEach((item, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = item.name;
        select.appendChild(option);
    });

    // 個数を1にリセットして再計算
    document.getElementById('item-count').value = 1;
    calculate();
}

// 計算処理関数
function calculate() {
    const select = document.getElementById('item-select');
    const countInput = document.getElementById('item-count');
    
    if (!select.value) return;

    const selectedIdx = parseInt(select.value);
    const count = Math.max(1, parseInt(countInput.value) || 1);
    countInput.value = count; // 不正な入力（マイナス等）を防ぐ

    const item = craftData[currentTab][selectedIdx];

    // 固定値の適用
    document.getElementById('res-mastery').textContent = item.mastery;

    // 個数に応じた計算
    const totalLabor = item.labor * count;
    const totalPrice = item.price * count;

    document.getElementById('res-labor').textContent = totalLabor.toLocaleString();
    document.getElementById('res-price').textContent = "¥" + totalPrice.toLocaleString();

    // 材料リストの更新
    const matsList = document.getElementById('materials-list');
    matsList.innerHTML = '';

    const matKeys = Object.keys(item.mats);
    if (matKeys.length === 0) {
        matsList.innerHTML = '<li class="no-materials">必要材料はありません</li>';
    } else {
        matKeys.forEach(matName => {
            const requiredAmount = item.mats[matName] * count;
            const li = document.createElement('li');
            li.innerHTML = `<span>${matName}</span> <span>${requiredAmount.toLocaleString()} 個</span>`;
            matsList.appendChild(li);
        });
    }
}

// 初期化（最初のタブを読み込む）
