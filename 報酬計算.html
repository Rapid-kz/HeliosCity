<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>FiveM 報酬分配計算ツール</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #1e1e24; color: #e0e0e0; margin: 20px; line-height: 1.6; }
        h1, h2 { color: #fff; border-bottom: 2px solid #ff4757; padding-bottom: 10px; }
        .container { max-width: 950px; margin: 0 auto; background: #2f2f38; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .section { margin-bottom: 25px; padding: 15px; background: #25252d; border-radius: 6px; }
        label { display: inline-block; margin-bottom: 5px; font-weight: bold; color: #ffa502; }
        input, select, textarea { background: #3a3a45; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 4px; box-sizing: border-box; width: 100%; margin-bottom: 10px; }
        input[type="number"] { -moz-appearance: textfield; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #444; padding: 10px; text-align: center; }
        th { background-color: #ff4757; color: white; }
        tr:nth-child(even) { background-color: #2a2a35; }
        .total-box { background: #ff4757; color: white; padding: 15px; font-size: 1.2rem; font-weight: bold; border-radius: 6px; text-align: center; margin-top: 10px; }
        .btn { background: #2ed573; color: white; border: none; padding: 10px 20px; font-size: 1rem; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn:hover { background: #26af5f; }
        textarea { font-family: monospace; height: 180px; resize: vertical; }
        .radio-group { display: flex; justify-content: center; gap: 10px; align-items: center; }
        .radio-group label { color: #fff; margin: 0; cursor: pointer; font-weight: normal; }
        .radio-group input[type="radio"] { width: auto; margin: 0; cursor: pointer; }
        .gp-mode-group { display: flex; gap: 20px; background: #3a3a45; padding: 10px; border-radius: 4px; border: 1px solid #555; margin-bottom: 10px; }
        .gp-mode-group label { color: #fff; cursor: pointer; font-weight: normal; margin: 0; display: flex; align-items: center; gap: 5px; }
        .gp-mode-group input[type="radio"] { width: auto; margin: 0; }
        .disabled-cell { color: #777; font-style: italic; background-color: #1e1e24; }
        .error-message { background: #ff4757; color: white; padding: 10px; margin-top: 10px; border-radius: 4px; font-weight: bold; text-align: center; display: none; }
    </style>
</head>
<body>

<a href="https://rapid-kz.github.io/HeliosCity/" class="fixed-link-btn" style="background-color: #00d2d3; color: #000000; font-weight: bold; padding: 10px 20px; border-radius: 5px; text-decoration: none; display: inline-block; box-shadow: 0 0 10px rgba(0, 210, 211, 0.5);">◀ ツール一覧へ戻る</a>

<div class="container">
    <h1>報酬分配計算ツール</h1>

    <div class="section">
        <h2>1. 犯罪の選択</h2>
        <div>
            <label>犯罪名</label>
            <select id="crime-select" onchange="calculateAll()">
                </select>
        </div>
    </div>

    <div class="section">
        <h2>2. 全体報酬額入力</h2>
        <div class="grid-2">
            <div>
                <label>現金 (100%換算)</label>
                <input type="number" id="cash" value="0" oninput="calculateAll()">
            </div>
            <div>
                <label>ダーティーマネー（額面）</label>
                <input type="number" id="dirty" value="0" oninput="calculateAll()">
            </div>
        </div>
        <div class="grid-2">
            <div>
                <label>ダーティーマネー換金率 (%)</label>
                <input type="number" id="dirty-rate" value="100" oninput="calculateAll()">
            </div>
            <div>
                <label>総報酬額（計算後合計）</label>
                <div id="total-reward-display" class="total-box">¥0</div>
                <div id="calc-error-display" class="error-message"></div>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>3. 参加者設定</h2>
        
        <div class="grid-2">
            <div>
                <label>参加人数</label>
                <select id="member-count" onchange="renderMemberTable()"></select>
            </div>
            <div>
                <label>ギャングプール運用パターン</label>
                <div class="gp-mode-group">
                    <label><input type="radio" name="gp-mode" value="normal" checked onchange="toggleGpInputMode()"> あり（等分）</label>
                    <label><input type="radio" name="gp-mode" value="none" onchange="toggleGpInputMode()"> なし</label>
                    <label><input type="radio" name="gp-mode" value="manual" onchange="toggleGpInputMode()"> 自由入力</label>
                </div>
            </div>
        </div>

        <div id="gp-manual-amount-wrapper" style="display: none; margin-bottom: 15px;">
            <label style="color: #ff4757;">ギャングプール自由入力額 (¥)</label>
            <input type="number" id="gp-manual-amount" value="0" oninput="calculateAll()" style="border: 1px solid #ff4757;">
        </div>
        
        <h3>メンバー別詳細入力</h3>
        <table id="member-table">
            <thead>
                <tr>
                    <th style="width: 20%;">名前</th>
                    <th style="width: 20%;">罰金有無</th>
                    <th style="width: 15%;">罰金</th>
                    <th style="width: 15%;">蘇生代</th>
                    <th style="width: 15%;">その他（自由入力）</th>
                    <th style="width: 15%;">最終支給額</th>
                </tr>
            </thead>
            <tbody id="member-tbody">
                </tbody>
        </table>
        
        <button class="btn" onclick="calculateAll()">計算を実行してコピペ欄を更新</button>
    </div>

    <div class="section">
        <h2>4. Discord用コピペ欄</h2>
        <textarea id="copy-paste-area" readonly onclick="this.select()"></textarea>
        <p style="font-size: 0.85rem; color: #aaa; margin-top: 5px;">※クリックすると全選択されます。そのままコピーしてDiscord等に貼り付けてください。</p>
    </div>
</div>

<script>
// --- 設定用データ ---
const crimeList = {
    "軍事基地襲撃": 6000000,
    "トレイン強盗": 6000000,
    "ヴァンジェリコ強盗(支店)": 6000000,
    "ボブキャット強盗": 6000000,
    "ヒューメインラボ強盗": 8000000,
    "客船襲撃強盗": 8000000,
    "飛行場襲撃強盗": 8000000,
    "オイルリグ強盗": 8000000,
    "大型金庫強盗": 8000000,
    "ヴァンジェリコ強盗(本店)": 8000000,
    "アーティファクト強盗": 10000000,
    "ユニオン強盗": 10000000,
    "アミュネーション強盗": 10000000,
    "パシフィック銀行強盗": 15000000,
};

const nameList = ["選択してください", "黒羽兎々", "天使りる", "黒雪クロノ", "草薙龍輝", "カビ", "山吹 怜", "ラピッド", "加羅元気", "なぶ", "プレイヤーJ", "プレイヤーK", "プレイヤーL", "プレイヤーM", "プレイヤーN", "プレイヤーO"];

window.onload = function() {
    initCrimeSelect();
    initMemberCountSelect();
    renderMemberTable();
};

function initCrimeSelect() {
    const select = document.getElementById('crime-select');
    let options = `<option value="">-- 犯罪名を選択 --</option>`;
    for (const crime in crimeList) {
        options += `<option value="${crime}">${crime} (¥${crimeList[crime].toLocaleString()})</option>`;
    }
    select.innerHTML = options;
}

function initMemberCountSelect() {
    const select = document.getElementById('member-count');
    for (let i = 4; i <= 15; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${i} 人`;
        select.appendChild(opt);
    }
}

function toggleGpInputMode() {
    const mode = document.querySelector('input[name="gp-mode"]:checked').value;
    const inputWrapper = document.getElementById('gp-manual-amount-wrapper');
    if (mode === 'manual') {
        inputWrapper.style.display = 'block';
    } else {
        inputWrapper.style.display = 'none';
    }
    calculateAll();
}

function renderMemberTable() {
    const count = parseInt(document.getElementById('member-count').value);
    const tbody = document.getElementById('member-tbody');
    tbody.innerHTML = '';

    let nameOptions = '';
    nameList.forEach(name => {
        nameOptions += `<option value="${name}">${name}</option>`;
    });

    for (let i = 1; i <= count; i++) {
        createRow(tbody, `member-name-${i}`, false, nameOptions, i);
    }
    createRow(tbody, `member-name-pool`, true, nameOptions, 0);

    calculateAll();
}

function createRow(tbody, idPrefix, isPool, nameOptions, index) {
    const tr = document.createElement('tr');
    
    if (isPool) {
        tr.innerHTML = `
            <td><strong>ギャングプール</strong></td>
            <td class="disabled-cell">-</td>
            <td class="disabled-cell">-</td>
            <td class="disabled-cell">-</td>
            <td class="disabled-cell">-</td>
            <td><span id="${idPrefix}-final" style="font-weight:bold; color:#ff4757;">¥0</span></td>
        `;
    } else {
        let syoseiOptions = `<option value="0">¥0</option>`;
        for(let m = 1; m <= 5; m++) {
            syoseiOptions += `<option value="${m * 1000000}">¥${m},000,000</option>`;
        }

        const radioGroup = `
            <div class="radio-group">
                <input type="radio" id="${idPrefix}-fine-on" name="fine-status-${index}" value="on" onchange="calculateAll()">
                <label for="${idPrefix}-fine-on">有</label>
                <input type="radio" id="${idPrefix}-fine-off" name="fine-status-${index}" value="off" checked onchange="calculateAll()">
                <label for="${idPrefix}-fine-off">無</label>
            </div>
        `;

        tr.innerHTML = `
            <td><select id="${idPrefix}">${nameOptions}</select></td>
            <td>${radioGroup}</td>
            <td><span id="${idPrefix}-fine-val">¥0</span></td>
            <td><select id="${idPrefix}-revive" onchange="calculateAll()">${syoseiOptions}</select></td>
            <td><input type="number" id="${idPrefix}-other" value="0" oninput="calculateAll()" style="margin:0;"></td>
            <td><span id="${idPrefix}-final" style="font-weight:bold; color:#2ed573;">¥0</span></td>
        `;
    }
    tbody.appendChild(tr);
}

function calculateAll() {
    let baseFineAmount = 0;
    let selectedCrimeName = "";
    const crimeSelect = document.getElementById('crime-select');
    if (crimeSelect && crimeSelect.value) {
        selectedCrimeName = crimeSelect.value;
        baseFineAmount = crimeList[selectedCrimeName];
    }

    const cash = parseFloat(document.getElementById('cash').value) || 0;
    const dirty = parseFloat(document.getElementById('dirty').value) || 0;
    const dirtyRate = parseFloat(document.getElementById('dirty-rate').value) || 0;
    
    const calculatedDirty = dirty * (dirtyRate / 100);
    const rawTotalReward = cash + calculatedDirty; 
    document.getElementById('total-reward-display').textContent = `¥${Math.floor(rawTotalReward).toLocaleString()}`;

    const count = parseInt(document.getElementById('member-count').value);
    const gpMode = document.querySelector('input[name="gp-mode"]:checked').value;

    // --- 【条件1】総報酬額からメンバー全員の追加罰金・追加蘇生代・その他を引く ---
    let totalDeductions = 0;
    let memberDataList = []; // 後続の計算用に各メンバーの入力値を一時保持

    for (let i = 1; i <= count; i++) {
        const idPrefix = `member-name-${i}`;
        
        const fineRadioOn = document.getElementById(`${idPrefix}-fine-on`);
        const hasFine = fineRadioOn ? fineRadioOn.checked : false; 
        const currentFine = hasFine ? baseFineAmount : 0;

        const revive = parseFloat(document.getElementById(`${idPrefix}-revive`).value) || 0;
        const other = parseFloat(document.getElementById(`${idPrefix}-other`).value) || 0;
        
        // 罰金と蘇生代を「引き」、その他を「足す」ための合計値を集計
        // (全体から引いておくことで、あとで特定の個人がこの金額を被るように調整できます)
        totalDeductions += (- currentFine - revive + other);

        memberDataList.push({
            idPrefix: idPrefix,
            currentFine: currentFine,
            revive: revive,
            other: other
        });
    }

    // 各自の補正を行ったあとの「調整後総報酬」
    const adjustedTotalReward = Math.max(0, rawTotalReward + totalDeductions);

    // --- 【条件2】ギャングプール運用パターンを参照して人数で等分（基礎分配） ---
    let divisor = count; 
    let baseSplit = 0;
    let poolFinalAmount = 0;
    let poolFraction = 0;
    let gpExplanationText = "";

    if (gpMode === 'normal') {
        divisor = count + 1; 
        poolFraction = adjustedTotalReward % 1000000; 
        const roundedTotal = adjustedTotalReward - poolFraction; 
        baseSplit = roundedTotal / divisor;
        poolFinalAmount = baseSplit + poolFraction;
        gpExplanationText = `調整後報酬から頭割り（${count}人 + GP1枠 ＝ 計${divisor}等分）+ 100万円未満端数`;
    } 
    else if (gpMode === 'none') {
        divisor = count; 
        baseSplit = adjustedTotalReward / divisor;
        poolFinalAmount = 0;
        gpExplanationText = `メンバーのみで調整後報酬を均等頭割り（計${count}等分）`;
    } 
    else if (gpMode === 'manual') {
        const manualInputGp = parseFloat(document.getElementById('gp-manual-amount').value) || 0;
        const rewardAfterGp = Math.max(0, adjustedTotalReward - manualInputGp); 
        divisor = count; 
        baseSplit = rewardAfterGp / divisor;
        poolFinalAmount = manualInputGp;
        gpExplanationText = `調整後報酬からGP指定額(¥${manualInputGp.toLocaleString()})を引いて、${count}人で等分`;
    }

    // --- 【条件3】基礎分配にそれぞれの追加罰金、追加蘇生代、その他を足す（最終支給額） ---
    let textOutputs = [];
    let totalCalculated = Math.floor(poolFinalAmount); 

    for (let i = 0; i < count; i++) {
        const member = memberDataList[i];
        
        let name = `メンバー ${i + 1}`;
        const nameSel = document.getElementById(member.idPrefix);
        if(nameSel && nameSel.value !== "選択してください") name = nameSel.value;

        // 基礎分配に「追加罰金」「追加蘇生代」を足し、「その他」を引く（条件1と逆の補正）
        const finalAmount = baseSplit + member.currentFine + member.revive - member.other;
        const roundedFinalAmount = Math.floor(finalAmount);
        
        totalCalculated += roundedFinalAmount; 

        document.getElementById(`${member.idPrefix}-fine-val`).textContent = `¥${member.currentFine.toLocaleString()}`;
        document.getElementById(`${member.idPrefix}-final`).textContent = `¥${roundedFinalAmount.toLocaleString()}`;

        textOutputs.push(`【${name}】\n ┗ 基礎分配: ¥${Math.floor(baseSplit).toLocaleString()}\n ┗ 追加罰金（戻し）: +¥${member.currentFine.toLocaleString()}\n ┗ 追加蘇生代（戻し）: +¥${member.revive.toLocaleString()}\n ┗ その他（差し引き）: -¥${member.other.toLocaleString()}\n ┗ ＝ 最終支給額: ¥${roundedFinalAmount.toLocaleString()}`);
    }

    document.getElementById(`member-name-pool-final`).textContent = `¥${Math.floor(poolFinalAmount).toLocaleString()}`;
    
    let poolTextDetails = `┗ 基礎分配: ¥${Math.floor(baseSplit).toLocaleString()}\n ┗ 100万円未満端数: ¥${Math.floor(poolFraction).toLocaleString()}`;
    if (gpMode === 'none') poolTextDetails = `┗ ギャングプール分配なし設定`;
    if (gpMode === 'manual') poolTextDetails = `┗ 自由入力指定額: ¥${Math.floor(poolFinalAmount).toLocaleString()}`;
    
    const poolText = `【ギャングプール】\n ${poolTextDetails}\n ┗ ＝ 最終支給額: ¥${Math.floor(poolFinalAmount).toLocaleString()}`;

    const crimeText = selectedCrimeName ? `・${selectedCrimeName} (基本罰金: ¥${baseFineAmount.toLocaleString()})` : "・なし";
    let modeLabelText = gpMode === 'normal' ? 'あり（等分）' : (gpMode === 'none' ? 'なし' : '自由入力');

    // 整合性チェック
    const targetTotal = Math.floor(rawTotalReward);
    const difference = totalCalculated - targetTotal;
    const errorDisplay = document.getElementById('calc-error-display');
    let errorPrefixText = "";

    if (difference !== 0) {
        const diffSign = difference > 0 ? "+" : "";
        const errorMsg = `【計算エラー】支給合計が総報酬額と一致しません（差額: ${diffSign}¥${difference.toLocaleString()}）`;
        errorDisplay.textContent = errorMsg;
        errorDisplay.style.display = 'block';
        errorPrefixText = `⚠️⚠️⚠️ ${errorMsg} ⚠️⚠️⚠️\n\n`;
    } else {
        errorDisplay.textContent = "";
        errorDisplay.style.display = 'none';
    }

    const copyPasteArea = document.getElementById('copy-paste-area');
    copyPasteArea.value = `${errorPrefixText}====== 強盗・犯罪報酬分配リポート ======
■ 確定犯罪内容：
${crimeText}
----------------------------------------
■ 報酬内訳・山分けルール：
・現金：¥${cash.toLocaleString()} (100%)
・ダーティーマネー額面：¥${dirty.toLocaleString()} (換金率: ${dirtyRate}%)
・総報酬額：¥${targetTotal.toLocaleString()}
・GP運用モード：${modeLabelText}
・山分け計算ベース：${gpExplanationText}
・頭割りベース（調整後1人あたり）：¥${Math.floor(baseSplit).toLocaleString()}
----------------------------------------
■ 各員最終分配額：
${textOutputs.join('\n\n')}

${poolText}
========================================`;
}
</script>

</body>
</html>
